[pytest]
# Testlerin aranacağı ana klasör
testpaths = tests

# Test dosyası isimlendirme kuralı
python_files = test_*.py

# Kullanılan özel etiketlerin (markers) kaydı
# Bu kayıtlar sayesinde "unknown marker" uyarılarını engelleriz
markers =
    fast: Hızlı unit testler (Augmentation, Validators, Config). Saniyeler içinde biter.
    medium: Entegrasyon testleri (CLI Akışı, Dağılım Analizi). Birkaç dakika sürebilir.
    slow: Ağır performans ve stres testleri (Benchmark, Bellek Analizi).

# Varsayılan çalışma seçenekleri
# -v: Detaylı çıktı verir
# --strict-markers: Kayıtlı olmayan bir marker kullanılırsa hata verir (yazım hatasını önler)
# -ra: Test sonuçlarının özetini (skipped, failed vb.) gösterir
addopts = -v --strict-markers -ra